name: Build FAST IHC Analyzer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: FAST_IHC_Analyzer_Windows
            ext: .exe
          - os: macos-latest
            artifact_name: FAST_IHC_Analyzer_macOS
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name "FAST_IHC_Analyzer" --icon=icon.ico --add-data "icon.ico;." --add-data "icon.png;." --noconfirm ihc_scorer.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --onefile --windowed --name "FAST_IHC_Analyzer" --icon=icon.icns --add-data "icon.ico:." --add-data "icon.png:." --noconfirm ihc_scorer.py

      - name: Zip macOS app
        if: runner.os == 'macOS'
        run: cd dist && zip -r FAST_IHC_Analyzer_macOS.zip FAST_IHC_Analyzer.app

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/FAST_IHC_Analyzer.exe

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/FAST_IHC_Analyzer_macOS.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FAST_IHC_Analyzer_Windows/FAST_IHC_Analyzer.exe
            FAST_IHC_Analyzer_macOS/FAST_IHC_Analyzer_macOS.zip
          generate_release_notes: true
